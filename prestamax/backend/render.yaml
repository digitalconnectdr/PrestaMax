services:
  - type: web
    name: prestamax-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: prestamax/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

    disk:
      name: prestamax-data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/prestamax.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      # Stripe (configurar manualmente en Render dashboard despues del deploy)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_BASICO
        sync: false
      - key: STRIPE_PRICE_PROFESIONAL
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false

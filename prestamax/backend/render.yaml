services:
  - type: web
    name: prestamax-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: prestamax/backend
    # --include=dev fuerza la instalacion de devDependencies (typescript,
    # @types/node, etc.) incluso cuando NODE_ENV=production.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

    # Disco persistente para SQLite. Sin esto la DB se pierde en cada redeploy.
    disk:
      name: prestamax-data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_PATH
        value: /var/data/prestamax.db

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 7d

      # Configurar manualmente en el dashboard de Render con la URL real
      # del frontend en Vercel (ej: https://prestamax.vercel.app)
      - key: FRONTEND_URL
        sync: false

    <script>
      (function() {
        var warned = false;
        function devtoolsCheck() {
          var threshold = 160;
          if (
            window.outerWidth - window.innerWidth > threshold ||
            window.outerHeight - window.innerHeight > threshold
          ) {
            if (!warned) {
              warned = true;
              console.clear();
              console.log(
                '%c\u26d4 STOP',
                'color:#dc2626;font-size:48px;font-weight:bold;'
              );
              console.log(
                '%cEsta es una herramienta para desarrolladores del navegador.\n'
                + 'Si alguien te indic\u00f3 que escribas o pegues algo aqu\u00ed,\n'
                + 'es posible que sea un intento de fraude o robo de datos.\n\n'
                + 'PrestaMax monitorea el uso sospechoso. El acceso no autorizado\n'
                + 'al c\u00f3digo o la infraestructura est\u00e1 prohibido y puede\n'
                + 'constituir un delito conforme a las leyes de Rep\u00fablica Dominicana.',
                'color:#1e3a5f;font-size:14px;font-family:monospace;line-height:1.6;'
              );
              console.log(
                '%c\u00a9 PrestaMax \u2014 JPRS Digital Connect. Todos los derechos reservados.',
                'color:#64748b;font-size:11px;'
              );
            }
          } else {
            warned = false;
          }
        }
        setInterval(devtoolsCheck, 1500);
      })();
    </script>
